<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driving School</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <a href="#" class="home">Home</a>
        <a href="#" class="login">Login</a>
    </div>
    <div class="content">
        <div class="infoDisplay">
            <h1>REPORTS</h1>
            <div class="graph1">Total Lessons: <strong id="totalLessons">0</strong></div>
            <div class="graph2">Completed Lessons: <strong id="completedLessons">0</strong></div>
            <div class="graph3">No-Show Lessons: <strong id="noShowLessons">0</strong></div>
            <div class="graph4">Outstanding Fees: <strong id="outstandingFees">$0</strong></div>

        </div>
        <div class="infoChange">
            <h1>CRUD operations</h1>
            <p>Loading data from ../test.json</p>

            <section class="formSection">
                <h2>Add Customer</h2>
                <form id="addCustomerForm">
                    <label for="customerFirstName">First Name</label>
                    <input id="customerFirstName" name="first_name" type="text" required>

                    <label for="customerLastName">Last Name</label>
                    <input id="customerLastName" name="last_name" type="text" required>

                    <label for="customerEmail">Email</label>
                    <input id="customerEmail" name="email_address" type="email" required>

                    <label for="customerPhone">Phone</label>
                    <input id="customerPhone" name="phone_number" type="tel" required>

                    <label for="customerStatus">Status</label>
                    <select id="customerStatus" name="customer_status_code" required>
                        <option value="GOOD">GOOD</option>
                        <option value="BAD">BAD</option>
                    </select>

                    <button type="submit">Create Customer</button>
                </form>
            </section>

            <section class="formSection">
                <h2>Update Lesson</h2>
                <form id="updateLessonForm">
                    <label for="lessonId">Lesson ID</label>
                    <input id="lessonId" name="lesson_id" type="number" required>

                    <label for="lessonDate">Lesson Date</label>
                    <input id="lessonDate" name="lesson_date" type="date" required>

                    <label for="lessonTime">Lesson Time</label>
                    <input id="lessonTime" name="lesson_time" type="time" required>

                    <label for="lessonStatus">Lesson Status</label>
                    <select id="lessonStatus" name="lesson_status_code" required>
                        <option value="SCH">SCH</option>
                        <option value="COMP">COMP</option>
                        <option value="CANC">CANC</option>
                        <option value="NOSH">NOSH</option>
                    </select>

                    <label for="lessonPrice">Price</label>
                    <input id="lessonPrice" name="price" type="number" min="0" step="0.01" required>

                    <button type="submit">Update Lesson</button>
                </form>
            </section>

            <section class="tableSection">
                <h2>Customers</h2>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Outstanding</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody"></tbody>
                </table>
            </section>

            <section class="tableSection">
                <h2>Lessons</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Lesson ID</th>
                            <th>Customer ID</th>
                            <th>Staff ID</th>
                            <th>Date</th>
                            <th>Time</th>
                            <th>Status</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody id="lessonTableBody"></tbody>
                </table>
            </section>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
